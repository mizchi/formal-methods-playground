name: moonbit

on:
  push:
  pull_request:
    paths:
      - ".github/workflows/moonbit.yml"
      - "flake.lock"
      - "flake.nix"
      - "justfile"
      - "languages/moonbit/**"
      - "scripts/moon-prove-opam.sh"
      - "scripts/setup-moonbit-prove-opam.sh"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Test MoonBit probes
        run: nix develop -c just test-moonbit

  prove:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Setup MoonBit prover switch
        run: nix develop -c just setup-moonbit-prove-opam

      - name: Prove MoonBit probes
        run: nix develop -c just prove-moonbit
